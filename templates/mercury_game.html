<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercury Explorer - Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mercury_game.css') }}">
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="dashboard-container">
        <div class="floating-planets">
            <div class="planet planet1"></div>
            <div class="planet planet2"></div>
            <div class="planet planet3"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-brand">🚀 Space Explorer</div>
            <div class="navbar-right">
                <div class="user-info">
                    <span class="user-email">{{ user.email }}</span>
                </div>
                <a href="{{ url_for('dashboard') }}" class="btn-logout" style="margin-right: 10px;">Dashboard</a>
                <a href="{{ url_for('game_zone') }}" class="btn-logout">Back</a>
            </div>
        </nav>

        <div class="mercury-game-container">
            <div class="game-header">
                <h1 class="game-title">🎮 Slide 1 – Drag & Drop Orbit Game</h1>
                <p class="game-subtitle">🪐 "Place Mercury in the Correct Orbit"</p>
                <p class="learning-goal">🎯 Mercury is the closest planet to the Sun</p>
            </div>

            <div class="game-canvas-wrapper">
                <canvas id="orbitGameCanvas"></canvas>
            </div>

            <div class="game-info">
                <div class="feedback-message" id="feedbackMessage"></div>
                <p class="task-info" id="taskInfo">Drag Mercury to the closest orbit around the Sun!</p>
            </div>

            <div class="game-controls">
                <button id="resetBtn" class="btn-game btn-reset">🔄 Reset</button>
            </div>
        </div>

        <div class="bottom-controls">
            <a href="{{ url_for('game_zone') }}" class="btn-back">⬅ Back to Game Zone</a>
            <a href="{{ url_for('orbit_speed') }}" class="btn-next">Next Slide: Orbit Speed ⮕</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/mercury_drag_drop_game.js') }}"></script>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        createStars();
    </script>
</body>
</html>
