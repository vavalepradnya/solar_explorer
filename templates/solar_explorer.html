<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Explorer - Space Explorer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/solar-system.css') }}">
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="dashboard-container">
        <div class="floating-planets">
            <div class="planet planet1"></div>
            <div class="planet planet2"></div>
            <div class="planet planet3"></div>
        </div>

        <nav class="navbar">
            <div class="navbar-brand">🚀 Space Explorer</div>
            <div class="navbar-right">
                <div class="user-info">
                    <span class="user-email">{{ user.email }}</span>
                </div>
                <a href="{{ url_for('dashboard') }}" class="btn-logout">Back</a>
            </div>
        </nav>

        <div class="solar-explorer-main">
            <div class="solar-system-container">
                <h1 class="solar-title">☀️ Interactive Solar System</h1>
                <p class="solar-subtitle">Hover over planets to see their names • Click Start Journey to explore with audio narration</p>
                
                <div class="controls-section">
                    <button id="startBtn" class="btn-control btn-start">▶ Start Journey</button>
                    <button id="stopBtn" class="btn-control btn-stop">⏹ Stop</button>
                    <button id="muteBtn" class="btn-control btn-mute">🔊 Mute Voice</button>
                </div>

                <div class="canvas-wrapper">
                    <canvas id="solarCanvas"></canvas>
                </div>

                <div class="info-display" id="infoDisplay">
                    <div class="info-tooltip" id="infoTooltip" style="display: none;"></div>
                </div>
            </div>
        </div>

        <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
    </div>

    <script src="{{ url_for('static', filename='js/solar-system.js') }}"></script>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        createStars();
    </script>
</body>
</html>
